services:
  backend:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.${ENV:-dev}
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
