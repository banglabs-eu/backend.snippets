services:
  backend:
    build:
      context: .
      args:
        GIT_VERSION: ${GIT_VERSION:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILT_AT: ${BUILT_AT:-unknown}
    network_mode: host
    command: ["sh", "-c", "uvicorn main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000} --workers 4"]
    env_file:
      - .env.${ENV:-dev}
    restart: unless-stopped
